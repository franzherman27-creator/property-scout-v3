<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Property Scout — Vazquez Roselli</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,500;0,700;0,900;1,300&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d2228; --surface:rgba(255,255,255,.04); --line:rgba(255,255,255,.12);
    --ink:#fff; --muted:rgba(255,255,255,.55); --dim:rgba(255,255,255,.35);
    --cyan:#2AB4BE; --amber:#D9A441; --red:#c0564f;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:'Barlow',sans-serif;
       font-weight:300;min-height:100vh;position:relative;padding:56px 28px}
  .bk{position:fixed;width:38px;height:38px;z-index:5;pointer-events:none}
  .tl{top:22px;left:22px;border-top:1.5px solid var(--line);border-left:1.5px solid var(--line)}
  .tr{top:22px;right:22px;border-top:1.5px solid var(--line);border-right:1.5px solid var(--line)}
  .bl{bottom:22px;left:22px;border-bottom:1.5px solid var(--line);border-left:1.5px solid var(--line)}
  .br{bottom:22px;right:22px;border-bottom:1.5px solid var(--line);border-right:1.5px solid var(--line)}
  .wrap{max-width:880px;margin:0 auto}
  .eyebrow{font-size:11px;letter-spacing:.38em;text-transform:uppercase;
           color:var(--cyan);font-weight:500;margin-bottom:14px}
  h1{font-weight:900;font-size:clamp(40px,7vw,64px);line-height:.92;
     text-transform:uppercase;letter-spacing:-1.5px;margin-bottom:8px}
  h1 span{color:var(--cyan)}
  .sub{color:var(--muted);font-size:15px;max-width:520px;line-height:1.6;margin-bottom:40px}

  .panel{background:var(--surface);border:1px solid var(--line);padding:22px;margin-bottom:14px}
  textarea{width:100%;background:transparent;border:1px solid var(--line);color:var(--ink);
           font-family:'Barlow';font-weight:300;font-size:16px;padding:14px;min-height:88px;
           resize:vertical;line-height:1.5}
  textarea:focus{outline:2px solid var(--cyan);outline-offset:-1px;border-color:transparent}
  textarea::placeholder{color:var(--dim);font-style:italic}
  .row{display:flex;gap:12px;align-items:center;margin-top:12px;flex-wrap:wrap}
  button{background:var(--cyan);color:#062024;border:0;font-family:'Barlow';font-weight:700;
         font-size:13px;letter-spacing:.14em;text-transform:uppercase;padding:12px 22px;
         cursor:pointer}
  button:hover{filter:brightness(1.12)}
  button:focus-visible{outline:2px solid #fff;outline-offset:2px}
  button.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  button:disabled{opacity:.45;cursor:wait}
  .hint{color:var(--dim);font-size:13px}

  .chips{display:flex;flex-wrap:wrap;gap:10px;margin:26px 0 6px}
  .chip{border:1px solid var(--line);padding:9px 14px;font-size:13px;color:var(--muted);
        cursor:pointer;display:flex;gap:10px;align-items:center}
  .chip.on{border-color:var(--cyan);color:var(--ink)}
  .chip .x{color:var(--dim);cursor:pointer;font-weight:500}
  .chip .x:hover{color:var(--red)}
  .chip .pause{color:var(--dim);cursor:pointer}
  .chip.paused{opacity:.45}

  .group{margin-top:36px}
  .gtitle{font-size:11px;letter-spacing:.38em;text-transform:uppercase;font-weight:500;
          margin-bottom:14px;display:flex;align-items:center;gap:12px}
  .gtitle::after{content:"";flex:1;height:1px;background:var(--line)}
  .g-match .gtitle{color:var(--cyan)} .g-rev .gtitle{color:var(--amber)}

  .card{background:var(--surface);border:1px solid var(--line);padding:20px 22px;
        margin-bottom:12px;display:grid;grid-template-columns:1fr auto;gap:18px}
  .portal{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);
          font-weight:500;margin-bottom:6px}
  .ct{font-weight:700;font-size:17px;line-height:1.25;margin-bottom:4px}
  .cp{color:var(--cyan);font-weight:700;font-size:15px;margin-bottom:10px}
  .cz{color:var(--dim);font-size:13px;font-weight:300;margin-left:8px}
  ul.rz{list-style:none;font-size:13.5px;color:var(--muted);line-height:1.55}
  ul.rz li::before{content:"— ";color:var(--dim)}
  .faltan{margin-top:8px;font-size:12.5px;color:var(--amber);font-style:italic}
  .alerta{margin-top:6px;font-size:12.5px;color:var(--red)}
  a.ver{display:inline-block;margin-top:12px;color:var(--cyan);font-size:13px;
        font-weight:500;letter-spacing:.06em;text-decoration:none;
        border-bottom:1px solid var(--cyan);padding-bottom:2px}
  .stamp{text-align:right;min-width:78px}
  .stamp .n{font-weight:900;font-size:46px;line-height:1;letter-spacing:-2px}
  .stamp .l{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);
            border-top:1px solid var(--line);margin-top:6px;padding-top:5px}
  .g-match .stamp .n{color:var(--cyan)} .g-rev .stamp .n{color:var(--amber)}

  .empty{border:1px dashed var(--line);padding:44px 24px;text-align:center;
         color:var(--dim);font-size:14.5px;line-height:1.6;font-style:italic}
  .status{margin-top:48px;padding-top:16px;border-top:1px solid var(--line);
          display:flex;justify-content:space-between;align-items:center;gap:14px;
          flex-wrap:wrap;color:var(--dim);font-size:12.5px;letter-spacing:.04em}
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
         background:#123239;border:1px solid var(--cyan);color:var(--ink);
         padding:12px 20px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}
  @media (max-width:560px){.card{grid-template-columns:1fr}.stamp{text-align:left;display:flex;align-items:baseline;gap:10px}.stamp .l{border:0;margin:0;padding:0}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="bk tl"></div><div class="bk tr"></div><div class="bk bl"></div><div class="bk br"></div>

<div class="wrap">
  <div class="eyebrow">Vazquez Roselli · Agente de búsqueda</div>
  <h1>Property<br><span>Scout.</span></h1>
  <p class="sub">Escribí el pedido tal cual te lo pasó el cliente. El agente rastrea el
  círculo de portales de La Plata cada hora y evalúa cada publicación contra el pedido.</p>

  <div class="panel">
    <textarea id="pedido" placeholder="Ej: Busco casa apto Banco Nación, zona norte o Tolosa, hasta 150.000 USD, 2 dormitorios y parque."></textarea>
    <div class="row">
      <button id="crear">Crear búsqueda</button>
      <span class="hint" id="crearHint"></span>
    </div>
  </div>

  <div class="chips" id="chips"></div>
  <div id="resultados"></div>

  <div class="status">
    <span id="statusTxt">Cargando estado…</span>
    <button class="ghost" id="forzar">Forzar scan ahora</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
let searches = [], filtro = null;

function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3200); }

async function api(path, opts){ const r = await fetch(path, opts);
  if(!r.ok){ const e = await r.json().catch(()=>({})); throw new Error(e.error||('Error '+r.status)); }
  return r.json(); }

async function cargarSearches(){
  const d = await api('/api/searches'); searches = d.searches||[]; pintarChips(); }

function pintarChips(){
  const c = $('chips'); c.innerHTML='';
  searches.forEach(s=>{
    const el = document.createElement('div');
    el.className = 'chip' + (filtro===s.id?' on':'') + (s.active?'':' paused');
    el.innerHTML = `<span>${s.parsed?.titulo||s.pedido_raw.slice(0,40)}</span>
      <span class="pause" title="${s.active?'Pausar':'Reactivar'}">${s.active?'⏸':'▶'}</span>
      <span class="x" title="Eliminar búsqueda">✕</span>`;
    el.querySelector('span').onclick = ()=>{ filtro = (filtro===s.id?null:s.id); pintarChips(); cargarMatches(); };
    el.querySelector('.pause').onclick = async ev=>{ ev.stopPropagation();
      await api(`/api/search/${s.id}/toggle`,{method:'POST'}); cargarSearches(); };
    el.querySelector('.x').onclick = async ev=>{ ev.stopPropagation();
      if(confirm('¿Eliminar esta búsqueda? Los resultados asociados dejan de mostrarse.')){
        await api(`/api/search/${s.id}`,{method:'DELETE'});
        if(filtro===s.id) filtro=null;
        cargarSearches(); cargarMatches(); } };
    c.appendChild(el);
  });
}

function card(m, tipo){
  const precio = m.precio ? `${(m.moneda||'').toUpperCase()} ${Number(m.precio).toLocaleString('es-AR')}` : 'Precio a consultar';
  const razones = (m.razones||[]).map(r=>`<li>${r}</li>`).join('');
  const faltan = (m.faltantes||[]).length ? `<div class="faltan">A confirmar: ${m.faltantes.join(' · ')}</div>` : '';
  const alertas = (m.alertas||[]).length ? `<div class="alerta">⚠ ${m.alertas.join(' · ')}</div>` : '';
  return `<div class="card">
    <div>
      <div class="portal">${m.portal}</div>
      <div class="ct">${m.titulo||'(sin título)'} <span class="cz">${m.zona_texto||''}</span></div>
      <div class="cp">${precio}</div>
      <ul class="rz">${razones}</ul>
      ${faltan}${alertas}
      <a class="ver" href="${m.url}" target="_blank" rel="noopener">Ver publicación →</a>
    </div>
    <div class="stamp"><div class="n">${m.score}</div><div class="l">score</div></div>
  </div>`;
}

async function cargarMatches(){
  const q = filtro ? `?search_id=${filtro}` : '';
  const d = await api('/api/matches'+q);
  const ms = d.matches||[];
  const matches = ms.filter(m=>m.veredicto==='match');
  const revisar = ms.filter(m=>m.veredicto==='revisar' && m.score>0);
  const r = $('resultados');
  if(!searches.length){
    r.innerHTML = `<div class="empty">Todavía no hay búsquedas activas.<br>
      Escribí arriba el pedido de tu cliente y el agente empieza a rastrear.</div>`;
    return;
  }
  let html = '';
  html += `<div class="group g-match"><div class="gtitle">Match exacto · ${matches.length}</div>`;
  html += matches.length ? matches.map(m=>card(m,'match')).join('')
        : `<div class="empty">Sin matches exactos por ahora. El agente sigue rastreando cada hora.</div>`;
  html += `</div>`;
  if(revisar.length){
    html += `<div class="group g-rev"><div class="gtitle">Para revisar · ${revisar.length}</div>`;
    html += revisar.map(m=>card(m,'rev')).join('') + `</div>`;
  }
  r.innerHTML = html;
}

async function cargarStatus(){
  try{
    const s = await api('/api/status');
    const key = s.api_key_configurada ? '' : ' · ⚠ falta ANTHROPIC_API_KEY';
    $('statusTxt').textContent =
      `${s.total_propiedades} propiedades rastreadas · último scan: ${s.last_scan||'—'}` +
      (s.scan_en_curso?' · scan en curso…':'') + key;
  }catch(e){ $('statusTxt').textContent = 'Sin conexión con el agente'; }
}

$('crear').onclick = async ()=>{
  const pedido = $('pedido').value.trim();
  if(!pedido){ toast('Escribí el pedido primero'); return; }
  $('crear').disabled = true; $('crearHint').textContent = 'Interpretando el pedido…';
  try{
    const d = await api('/api/search',{method:'POST',
      headers:{'Content-Type':'application/json'}, body:JSON.stringify({pedido})});
    $('pedido').value=''; toast(`Búsqueda creada: ${d.search.parsed.titulo}`);
    await cargarSearches(); cargarMatches();
  }catch(e){ toast(e.message); }
  $('crear').disabled = false; $('crearHint').textContent='';
};

$('forzar').onclick = async ()=>{ await api('/api/scan',{method:'POST'});
  toast('Scan iniciado — los resultados aparecen a medida que se evalúan'); };

(async ()=>{ await cargarSearches(); cargarMatches(); cargarStatus();
  setInterval(()=>{ cargarMatches(); cargarStatus(); }, 30000); })();
</script>
</body>
</html>
